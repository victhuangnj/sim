<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Web3 散户模拟器 - 炼金叔叔</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <style>
    body { font-family: "Microsoft YaHei", system-ui, sans-serif; }
    .card { transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
    .card:hover { transform: translateY(-6px) scale(1.02); }
    .price-up { animation: priceUp 0.6s; }
    @keyframes priceUp { 0% { transform: scale(1.25); color: #22c55e; } }
    .price-down { animation: priceDown 0.6s; }
    @keyframes priceDown { 0% { transform: scale(0.75); color: #ef4444; } }
    .modal { animation: modalPop 0.4s ease-out; }
    @keyframes modalPop { from { opacity: 0; transform: scale(0.8); } }
    #worthChart { max-height: 160px; }
  </style>
</head>
<body class="bg-slate-950 text-white min-h-screen">
  <div class="max-w-2xl mx-auto bg-slate-900 min-h-screen shadow-2xl overflow-hidden" id="app"></div>
  <div id="modalOverlay" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center z-50"></div>

  <script>
    let player = {
      name: "炼金叔叔",
      cash: 1000,
      age: 1,
      netWorth: 1000,
      mental: 85,
      portfolio: { btc: 0, btcAvg: 0, eth: 0, ethAvg: 0, alt: 0, altAvg: 0, meme: [] },
      history: [],
      worthHistory: [1000],
      celebrated10k: false,
      celebrated50k: false,
      celebrated100k: false
    };

    let market = {
      btc: 65200, eth: 3280, alt: 420,
      memes: [
        { name: "$PEPE", price: 0.000012 },
        { name: "$GROK", price: 0.000009 },
        { name: "$TRUMP", price: 13.8 },
        { name: "$MOON", price: 0.00052 }
      ]
    };

    const newsEvents = [
      { text: "🚀 Elon Musk 发推力挺 meme！", impact: "bull", desc: "BTC + Meme 大涨" },
      { text: "📉 SEC 重拳监管加密市场", impact: "bear", desc: "全市场恐慌下跌" },
      { text: "🔥 新 meme 币被 KOL 集体安利", impact: "memePump", desc: "Meme 板块暴涨" },
      { text: "💥 大户砸盘 + 交易所被攻击", impact: "bear", desc: "风险资产暴跌" },
      { text: "✅ 比特币 ETF 获巨额资金流入", impact: "bull", desc: "BTC 单日大涨" }
    ];

    const actions = [
      { id:1, name:"🟡 买 BTC 现货", desc:"稳健", type:"buy", coin:"btc" },
      { id:2, name:"🔵 买 ETH 现货", desc:"布局", type:"buy", coin:"eth" },
      { id:3, name:"🟣 买山寨币", desc:"高波动", type:"buy", coin:"alt" },
      { id:4, name:"🔥 梭哈 Meme", desc:"全仓赌命", type:"meme" },
      { id:5, name:"📈 开 10x 合约", desc:"立即结算", type:"contract" },
      { id:6, name:"😌 冷静休息", desc:"恢复心态", type:"rest" },
      { id:7, name:"🏆 功成身退", desc:"结束游戏", type:"retire" }
    ];

    let currentChart = null;

    function formatMoney(amount) {
      return '$' + Number(amount).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    }

    function getSellActions() {
      let sells = [];
      if (player.portfolio.btc > 0) sells.push({id:10, name:"🟡 卖出 BTC", type:"sell", coin:"btc"});
      if (player.portfolio.eth > 0) sells.push({id:11, name:"🔵 卖出 ETH", type:"sell", coin:"eth"});
      if (player.portfolio.alt > 0) sells.push({id:12, name:"🟣 卖出山寨币", type:"sell", coin:"alt"});
      if (player.portfolio.meme.length > 0) sells.push({id:13, name:"🔥 卖出所有 Meme", type:"sellMeme"});
      return sells;
    }

    function updateMarket() {
      market.btc *= (0.93 + Math.random() * 0.15);
      market.eth *= (0.92 + Math.random() * 0.17);
      market.alt *= (0.85 + Math.random() * 0.35);
      market.memes.forEach(m => m.price *= (0.65 + Math.random() * 0.9));
    }

    function calculateNetWorth() {
      let total = player.cash;
      total += player.portfolio.btc * market.btc;
      total += player.portfolio.eth * market.eth;
      total += player.portfolio.alt * market.alt;
      player.portfolio.meme.forEach(m => {
        const curr = market.memes.find(x => x.name === m.name)?.price || m.avg;
        total += m.amount * curr;
      });
      player.netWorth = Math.max(0, Math.round(total * 100) / 100);
      return player.netWorth;
    }

    function addHistory(text) {
      player.history.unshift({day: player.age, text});
      if (player.history.length > 8) player.history.pop();
    }

    function triggerRandomNews() {
      if (Math.random() < 0.42) {
        const news = newsEvents[Math.floor(Math.random() * newsEvents.length)];
        if (news.impact === "bull") { market.btc *= 1.20; market.eth *= 1.15; }
        else if (news.impact === "bear") { market.btc *= 0.73; market.eth *= 0.70; market.alt *= 0.65; }
        else if (news.impact === "memePump") market.memes.forEach(m => m.price *= (2.2 + Math.random() * 2.5));
        showModal(news.text, news.desc, "📰");
        addHistory("📰 " + news.text);
      }
    }

    function showModal(title, desc, emoji = "🎉") {
      const overlay = document.getElementById('modalOverlay');
      overlay.innerHTML = `
        <div class="modal bg-slate-900 border border-white/30 rounded-3xl p-8 max-w-xs text-center mx-4">
          <div class="text-6xl mb-4">${emoji}</div>
          <h2 class="text-2xl font-bold mb-3">${title}</h2>
          <p class="text-slate-300 mb-6">${desc}</p>
          <button onclick="closeModal()" class="w-full bg-white text-slate-900 py-4 rounded-2xl font-bold">继续</button>
        </div>
      `;
      overlay.classList.remove('hidden');
    }

    function closeModal() {
      document.getElementById('modalOverlay').classList.add('hidden');
    }

    function celebrate(milestone) {
      let msg = "";
      if (milestone === 10000) msg = "🎊 净值突破 1 万美元！你已经不是纯小白了！";
      else if (milestone === 50000) msg = "🔥 牛逼！净值达到 5 万美元！散户中的战斗机！";
      else if (milestone === 100000) msg = "🌟 传奇诞生！净值突破 10 万美元！你就是 Web3 炼金之神！";
      showModal("里程碑达成", msg, "🏆");
    }

    function promptAmount(defaultAmount, title) {
      let amount = prompt(title || "请输入金额 (USDT):", defaultAmount);
      amount = parseFloat(amount);
      return isNaN(amount) || amount <= 0 ? null : Math.min(amount, player.cash);
    }

    function doAction(id) {
      let act = actions.find(a => a.id === id) || getSellActions().find(a => a.id === id);
      if (!act) return;

      let resultText = "";
      let amount = 0;

      if (act.type === "buy" || act.type === "contract" || act.type === "meme") {
        if (act.type === "meme") amount = promptAmount(player.cash, "梭哈金额 (最多全部现金):");
        else if (act.type === "contract") amount = promptAmount(100, "开合约保证金 (最低100):");
        else amount = promptAmount(act.coin === "btc" ? 200 : act.coin === "eth" ? 150 : 180, "买入金额 (USDT):");

        if (!amount || amount > player.cash) return alert("金额无效或现金不足！");
      }

      if (act.type === "buy") {
        const price = act.coin === "btc" ? market.btc : act.coin === "eth" ? market.eth : market.alt;
        const qty = amount / price;
        if (act.coin === "btc") {
          const oldQty = player.portfolio.btc;
          player.portfolio.btc += qty;
          player.portfolio.btcAvg = (player.portfolio.btcAvg * oldQty + price * qty) / player.portfolio.btc;
        } else if (act.coin === "eth") {
          const oldQty = player.portfolio.eth;
          player.portfolio.eth += qty;
          player.portfolio.ethAvg = (player.portfolio.ethAvg * oldQty + price * qty) / player.portfolio.eth;
        } else {
          const oldQty = player.portfolio.alt;
          player.portfolio.alt += qty;
          player.portfolio.altAvg = (player.portfolio.altAvg * oldQty + price * qty) / player.portfolio.alt;
        }
        player.cash -= amount;
        resultText = `买入 ${act.name.replace("买","")} $${amount.toFixed(2)}`;
      }
      else if (act.type === "meme") {
        const meme = market.memes[Math.floor(Math.random() * market.memes.length)];
        player.portfolio.meme.push({name: meme.name, amount: amount / meme.price, avg: meme.price});
        player.cash -= amount;
        resultText = `梭哈 ${meme.name} $${amount.toFixed(2)}`;
      }
      else if (act.type === "contract") {
        const win = Math.random() > 0.48;
        const pnl = win ? (Math.random() * 15 + 3) * amount : -(Math.random() * 9 + 1) * amount;
        player.cash += pnl + amount;   // 返还保证金 + 盈亏
        resultText = win ? `📈 10x 合约大赚 +$${pnl.toFixed(2)}` : `📉 10x 合约亏损 $${pnl.toFixed(2)}`;
      }
      else if (act.type === "rest") {
        player.mental = Math.min(100, player.mental + 35);
        resultText = "😌 冷静休息，心态恢复";
      }
      else if (act.type === "sell") {
        let value = 0;
        if (act.coin === "btc" && player.portfolio.btc > 0) { value = player.portfolio.btc * market.btc; player.cash += value; player.portfolio.btc = 0; }
        else if (act.coin === "eth" && player.portfolio.eth > 0) { value = player.portfolio.eth * market.eth; player.cash += value; player.portfolio.eth = 0; }
        else if (act.coin === "alt" && player.portfolio.alt > 0) { value = player.portfolio.alt * market.alt; player.cash += value; player.portfolio.alt = 0; }
        resultText = `卖出全部 ${act.coin.toUpperCase()} 获利 $${value.toFixed(2)}`;
      }
      else if (act.type === "sellMeme") {
        let totalValue = 0;
        player.portfolio.meme.forEach(m => {
          const curr = market.memes.find(x => x.name === m.name)?.price || m.avg;
          totalValue += m.amount * curr;
        });
        player.cash += totalValue;
        player.portfolio.meme = [];
        resultText = `全部卖出 Meme 获利 $${totalValue.toFixed(2)}`;
      }
      else if (act.type === "retire") {
        showRetireScreen();
        return;
      }

      player.mental = Math.max(15, player.mental - 10);
      addHistory(resultText);

      setTimeout(() => {
        player.age++;
        updateMarket();
        triggerRandomNews();

        const nw = calculateNetWorth();
        player.worthHistory.push(nw);
        if (player.worthHistory.length > 12) player.worthHistory.shift();

        if (nw >= 100000 && !player.celebrated100k) { celebrate(100000); player.celebrated100k = true; }
        else if (nw >= 50000 && !player.celebrated50k) { celebrate(50000); player.celebrated50k = true; }
        else if (nw >= 10000 && !player.celebrated10k) { celebrate(10000); player.celebrated10k = true; }

        if (nw <= 0) { showGameOver(); return; }

        render();
      }, 300);
    }

    function showRetireScreen() {
      const nw = calculateNetWorth();
      let msg = `你选择了功成身退！<br>最终净值：${formatMoney(nw)}`;
      if (nw >= 100000) msg += "<br><br>🌟 你是真正的 Web3 传奇！";
      else if (nw >= 50000) msg += "<br><br>🔥 非常成功的散户！";
      else if (nw >= 10000) msg += "<br><br>🎉 已经实现财务自由小目标！";

      const app = document.getElementById('app');
      app.innerHTML = `
        <div class="min-h-screen flex flex-col items-center justify-center bg-gradient-to-br from-emerald-950 to-black p-8 text-center">
          <div class="text-7xl mb-6">🏆</div>
          <h1 class="text-5xl font-bold mb-6 text-emerald-400">功成身退</h1>
          <div class="text-2xl mb-8 leading-relaxed">${msg}</div>
          <button onclick="resetGame()" class="bg-white hover:bg-emerald-400 text-slate-900 px-16 py-6 rounded-3xl text-2xl font-bold transition">重新开始新人生</button>
        </div>
      `;
    }

    function showGameOver() {
      const app = document.getElementById('app');
      app.innerHTML = `
        <div class="min-h-screen flex flex-col items-center justify-center bg-gradient-to-br from-red-950 to-black p-8 text-center">
          <div class="text-8xl mb-6 animate-pulse">💀</div>
          <h1 class="text-5xl font-bold text-red-400 mb-4">GAME OVER</h1>
          <p class="text-3xl mb-10">拜拜了，Web3<br>我要去送外卖了…</p>
          <div class="text-xl text-slate-400 mb-12">第 ${player.age} 天彻底归零</div>
          <button onclick="resetGame()" class="bg-white hover:bg-orange-400 text-slate-900 px-16 py-6 rounded-3xl text-2xl font-bold transition">重新开始炼金之路</button>
        </div>
      `;
    }

    function editName() {
      const newName = prompt("输入你的散户大名：", player.name);
      if (newName && newName.trim()) player.name = newName.trim();
      render();
    }

    function render() {
      const app = document.getElementById('app');
      const nw = calculateNetWorth();
      const sellActions = getSellActions();

      if (currentChart) { currentChart.destroy(); currentChart = null; }

      let memeHTML = player.portfolio.meme.map(m => {
        const curr = market.memes.find(x => x.name === m.name)?.price || m.avg;
        const pnl = ((curr / m.avg - 1) * 100).toFixed(1);
        const value = (m.amount * curr).toFixed(2);
        return `<div class="flex justify-between py-1 text-sm"><span>${m.name}</span><span>$${value}</span><span class="${pnl>0 ? 'text-green-400' : 'text-red-400'}">${pnl}%</span></div>`;
      }).join('');

      const chartLabels = player.worthHistory.map((_, i) => `D${player.age - player.worthHistory.length + 1 + i}`);
      const chartData = player.worthHistory;

      let html = `
        <div class="p-6 bg-gradient-to-br from-slate-900 to-black">
          <div class="flex justify-between items-center mb-5">
            <div onclick="editName()" class="flex items-center gap-3 cursor-pointer">
              <span class="text-3xl font-bold">${player.name}</span>
              <span class="text-xs bg-slate-700 px-3 py-1 rounded-full">✏️ 改名</span>
            </div>
            <div class="text-right">
              <div class="text-xs text-slate-400">第 ${player.age} 天</div>
              <div class="text-4xl font-bold ${nw >= 1000 ? 'text-green-400 price-up' : 'text-red-400 price-down'}">${formatMoney(nw)}</div>
            </div>
          </div>

          <div class="grid grid-cols-2 gap-4 mb-6">
            <div class="bg-slate-800 rounded-3xl p-5">
              <div class="text-xs text-slate-400">现金</div>
              <div class="text-3xl font-bold">${formatMoney(player.cash)}</div>
            </div>
            <div class="bg-slate-800 rounded-3xl p-5">
              <div class="text-xs text-slate-400">心态</div>
              <div class="text-3xl font-bold">${player.mental} ❤️</div>
            </div>
          </div>

          <div class="bg-slate-800 rounded-3xl p-5 mb-6">
            <div class="text-sm font-medium mb-3">净值走势（最近12天）</div>
            <div style="position:relative; height:160px;">
              <canvas id="worthChart"></canvas>
            </div>
          </div>

          <div class="bg-slate-800 rounded-3xl p-5 mb-6">
            <div class="text-sm font-medium mb-3">我的持仓（市值）</div>
            ${player.portfolio.btc > 0 ? `<div class="flex justify-between py-1 text-sm"><span>BTC ×${player.portfolio.btc.toFixed(4)}</span><span>$${ (player.portfolio.btc * market.btc).toFixed(2) }</span></div>` : ''}
            ${player.portfolio.eth > 0 ? `<div class="flex justify-between py-1 text-sm"><span>ETH ×${player.portfolio.eth.toFixed(3)}</span><span>$${ (player.portfolio.eth * market.eth).toFixed(2) }</span></div>` : ''}
            ${player.portfolio.alt > 0 ? `<div class="flex justify-between py-1 text-sm"><span>山寨 ×${player.portfolio.alt.toFixed(2)}</span><span>$${ (player.portfolio.alt * market.alt).toFixed(2) }</span></div>` : ''}
            ${memeHTML ? `<div class="mt-3 pt-3 border-t border-slate-700">${memeHTML}</div>` : ''}
            ${!player.portfolio.btc && !player.portfolio.eth && !player.portfolio.alt && !player.portfolio.meme.length ? `<div class="text-center py-6 text-slate-500">空仓 • 快去操作！</div>` : ''}
          </div>

          <div class="mb-6">
            <div class="text-lg font-semibold mb-4">🚀 操作区</div>
            <div class="grid grid-cols-2 gap-3">
              ${actions.map(a => `
                <div onclick="doAction(${a.id})" class="card bg-slate-800 p-4 rounded-3xl cursor-pointer hover:bg-violet-900/30 border border-slate-700">
                  <div class="text-xl mb-1">${a.name}</div>
                  <div class="text-xs text-slate-400">${a.desc}</div>
                </div>
              `).join('')}
              ${sellActions.map(a => `
                <div onclick="doAction(${a.id})" class="card bg-red-900/30 p-4 rounded-3xl cursor-pointer hover:bg-red-900/60 border border-red-700">
                  <div class="text-xl mb-1">${a.name}</div>
                  <div class="text-xs text-red-400">卖出变现</div>
                </div>
              `).join('')}
            </div>
          </div>

          <div class="px-2">
            <div class="text-lg font-semibold mb-3">📜 最近记录</div>
            <div class="max-h-52 overflow-y-auto space-y-2 text-sm">
              ${player.history.map(h => `
                <div class="bg-slate-800/70 px-4 py-3 rounded-2xl flex justify-between">
                  <span class="text-slate-400">D${h.day}</span>
                  <span>${h.text}</span>
                </div>
              `).join('')}
            </div>
          </div>
        </div>
      `;

      app.innerHTML = html;

      setTimeout(() => {
        const ctx = document.getElementById('worthChart');
        if (ctx) {
          currentChart = new Chart(ctx, {
            type: 'line',
            data: { labels: chartLabels, datasets: [{ label: '净值', data: chartData, borderColor: '#22c55e', tension: 0.3, borderWidth: 3, pointRadius: 2 }] },
            options: {
              responsive: true,
              maintainAspectRatio: false,
              plugins: { legend: { display: false } },
              scales: { y: { grid: { color: '#334155' }, ticks: { color: '#64748b' } }, x: { grid: { color: '#334155' }, ticks: { color: '#64748b', maxTicksLimit: 6 } } }
            }
          });
        }
      }, 100);
    }

    function resetGame() {
      if (confirm("确定重置游戏吗？")) {
        localStorage.removeItem('web3Sim2026');
        location.reload();
      }
    }

    window.onload = () => {
      const saved = localStorage.getItem('web3Sim2026');
      if (saved) player = JSON.parse(saved);
      render();
    };

    setInterval(() => {
      localStorage.setItem('web3Sim2026', JSON.stringify(player));
    }, 10000);

    window.doAction = doAction;
    window.resetGame = resetGame;
    window.editName = editName;
    window.closeModal = closeModal;
  </script>
</body>
</html>
